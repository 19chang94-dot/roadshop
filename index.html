<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>동업계 상권별 매출 현황</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f2;
      --panel: #ffffff;
      --text: #1f2528;
      --muted: #667073;
      --line: #d7ded9;
      --line-strong: #aebbb3;
      --yellow: #ffe500;
      --green: #00b85c;
      --green-dark: #047143;
      --sky: #1289c8;
      --sky-dark: #075c8f;
      --black: #111111;
      --red: #e32222;
      --blue: #1360bf;
      --soft-green: #e9f7ef;
      --soft-yellow: #fff9cc;
      --soft-sky: #e7f5fc;
      --shadow: 0 12px 28px rgba(31, 37, 40, 0.08);
      font-family: "Pretendard", "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    body.locked .app {
      display: none;
    }

    body:not(.locked) .password-gate {
      display: none;
    }

    .password-gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .password-box {
      width: min(360px, 100%);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .password-box label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .password-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .password-row input {
      width: 100%;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .password-row input:focus {
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(0,184,92,0.15);
    }

    .password-error {
      min-height: 18px;
      margin-top: 9px;
      color: var(--red);
      font-size: 12px;
      font-weight: 800;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(23px, 3vw, 34px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      white-space: nowrap;
    }

    .mode-tabs {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    }

    .mode-tabs button {
      min-height: 36px;
      padding: 0 13px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }

    .mode-tabs button.is-active {
      background: var(--text);
      color: #fff;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.15fr 1fr 0.85fr 0.8fr 0.9fr 0.9fr auto;
      gap: 9px;
      align-items: end;
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.88);
      box-shadow: var(--shadow);
    }

    .field {
      min-width: 0;
    }

    .field label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(0,184,92,0.15);
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      min-height: 40px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    .icon-button:hover {
      background: #f9fbf8;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric {
      min-height: 98px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .metric:nth-child(2) {
      background: linear-gradient(180deg, #fff, var(--soft-green));
    }

    .metric:nth-child(3) {
      background: linear-gradient(180deg, #fff, var(--soft-yellow));
    }

    .metric:nth-child(4) {
      background: linear-gradient(180deg, #fff, var(--soft-sky));
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric-value {
      margin-top: 10px;
      font-size: clamp(22px, 2.8vw, 31px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .metric-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-height: 52px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .panel-title {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .diamond {
      width: 10px;
      height: 10px;
      transform: rotate(45deg);
      background: var(--black);
      border-left: 4px solid #0f8ad2;
      flex: 0 0 auto;
    }

    .unit {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      max-height: 660px;
    }

    table {
      width: 100%;
      min-width: 1060px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border: 1px solid #111;
      padding: 7px 9px;
      white-space: nowrap;
      vertical-align: middle;
      background: #fff;
    }

    th {
      text-align: center;
      font-weight: 900;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .head-main {
      background: var(--yellow);
      color: #111;
      font-size: 15px;
    }

    .head-month {
      background: #f7f7f7;
    }

    .head-ytd {
      background: var(--yellow);
    }

    .head-close {
      background: var(--green);
      color: #fff;
    }

    .head-close2 {
      background: var(--sky);
      color: #fff;
    }

    .head-growth {
      background: #050505;
      color: #fff;
    }

    .left-head {
      background: #f5f5f5;
    }

    td.name {
      font-weight: 800;
    }

    td.number {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .close-cell {
      background: #02b65b;
      color: #071e11;
      font-weight: 900;
    }

    .close2-cell {
      background: #0f88c5;
      color: #031926;
      font-weight: 900;
    }

    .growth {
      text-align: center;
      font-weight: 900;
    }

    .up {
      color: #111;
    }

    .down {
      color: var(--red);
    }

    .avg-row td {
      background: #d0cece;
      font-weight: 900;
    }

    .muted {
      color: var(--muted);
      font-weight: 500;
    }

    .remark {
      min-width: 210px;
      max-width: 340px;
      white-space: normal;
      line-height: 1.35;
      color: #4e585b;
    }

    .remark strong {
      color: var(--text);
    }

    .empty {
      padding: 40px 12px;
      text-align: center;
      color: var(--muted);
      border: 0;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1080px) {
      .controls {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .app {
        padding: 12px;
      }

      .top {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .mode-tabs {
        width: 100%;
      }

      .mode-tabs button {
        flex: 1 1 0;
      }

      .controls,
      .summary {
        grid-template-columns: 1fr;
      }

      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .unit {
        white-space: normal;
      }
    }
  </style>
</head>
<body class="locked">
  <section class="password-gate" id="passwordGate">
    <form class="password-box" id="passwordForm">
      <label for="passwordInput">비밀번호</label>
      <div class="password-row">
        <input id="passwordInput" type="password" autocomplete="current-password" aria-describedby="passwordError">
        <button class="icon-button" type="submit" title="확인" aria-label="확인">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
        </button>
      </div>
      <div class="password-error" id="passwordError" aria-live="polite"></div>
    </form>
  </section>

  <main class="app" id="appRoot" aria-hidden="true">
    <header class="top">
      <div>
        <h1>동업계 상권별 매출 현황</h1>
        <div class="sub">
          <span class="pill" id="sourceLabel">원본</span>
          <span class="pill" id="asOfLabel">기준</span>
          <span class="pill">단위: 천원</span>
        </div>
      </div>
      <div class="mode-tabs" aria-label="대시보드 선택">
        <button type="button" class="is-active" data-mode="market">상권 대시보드</button>
        <button type="button" data-mode="brand">브랜드 대시보드</button>
      </div>
    </header>

    <section class="controls" aria-label="조회 조건">
      <div class="field" id="marketField">
        <label for="marketInput">상권 검색</label>
        <input id="marketInput" list="marketList" autocomplete="off">
        <datalist id="marketList"></datalist>
      </div>
      <div class="field" id="marketPickField">
        <label for="marketSelect">상권 목록</label>
        <select id="marketSelect"></select>
      </div>
      <div class="field" id="brandField">
        <label for="brandSelect">브랜드</label>
        <select id="brandSelect"></select>
      </div>
      <div class="field">
        <label for="monthSelect">기준월</label>
        <select id="monthSelect"></select>
      </div>
      <div class="field">
        <label for="regionSelect">지역</label>
        <select id="regionSelect"></select>
      </div>
      <div class="field">
        <label for="statusSelect">구분</label>
        <select id="statusSelect"></select>
      </div>
      <button class="icon-button" type="button" id="resetButton" title="초기화" aria-label="초기화">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v7h7"/></svg>
      </button>
    </section>

    <section class="summary" aria-label="요약">
      <article class="metric">
        <div class="metric-label" id="metricOneLabel">월 매출</div>
        <div class="metric-value" id="metricOne">-</div>
        <div class="metric-note" id="metricOneNote">-</div>
      </article>
      <article class="metric">
        <div class="metric-label">월 신장율</div>
        <div class="metric-value" id="metricTwo">-</div>
        <div class="metric-note" id="metricTwoNote">-</div>
      </article>
      <article class="metric">
        <div class="metric-label">동기간 누계</div>
        <div class="metric-value" id="metricThree">-</div>
        <div class="metric-note" id="metricThreeNote">-</div>
      </article>
      <article class="metric">
        <div class="metric-label" id="metricFourLabel">표시 항목</div>
        <div class="metric-value" id="metricFour">-</div>
        <div class="metric-note" id="metricFourNote">-</div>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2 class="panel-title"><span class="diamond"></span><span id="dashboardTitle">상권 매출 현황</span></h2>
        <span class="unit" id="dashboardUnit">(단위 : 천원)</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const password = "roadshop";
      const form = document.getElementById("passwordForm");
      const input = document.getElementById("passwordInput");
      const error = document.getElementById("passwordError");
      const appRoot = document.getElementById("appRoot");
      const gate = document.getElementById("passwordGate");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        if (input.value === password) {
          document.body.classList.remove("locked");
          appRoot.removeAttribute("aria-hidden");
          gate.setAttribute("aria-hidden", "true");
          input.value = "";
          error.textContent = "";
          return;
        }

        error.textContent = "비밀번호가 맞지 않습니다.";
        input.select();
      });

      setTimeout(() => input.focus(), 0);
    })();
  </script>

  <script src="./data.js?v=20260604-1"></script>
  <script>
    (function () {
      const DATA = window.BRAND_SALES_DATA;
      const els = {};
      const state = {
        mode: "market",
        market: "",
        brand: "",
        month: 1,
        region: "all",
        status: "입점"
      };

      function showDataLoadError() {
        const appRoot = document.getElementById("appRoot");
        if (!appRoot) return;

        appRoot.innerHTML = `
          <section class="panel">
            <div class="empty">
              <strong>data.js를 불러오지 못했습니다.</strong><br>
              GitHub 저장소에서 <code>index.html</code>과 같은 위치에 <code>data.js</code>가 있는지 확인하세요.<br>
              파일명은 대소문자까지 정확히 <code>data.js</code>여야 합니다.
            </div>
          </section>
        `;
      }

      if (!DATA || !Array.isArray(DATA.periods) || !Array.isArray(DATA.records)) {
        showDataLoadError();
        return;
      }

      function byId(id) {
        return document.getElementById(id);
      }

      function initElements() {
        [
          "sourceLabel", "asOfLabel", "marketField", "marketPickField", "brandField", "marketInput",
          "marketList", "marketSelect", "brandSelect", "monthSelect", "regionSelect", "statusSelect",
          "resetButton", "metricOneLabel", "metricOne", "metricOneNote", "metricTwo",
          "metricTwoNote", "metricThree", "metricThreeNote", "metricFourLabel",
          "metricFour", "metricFourNote", "dashboardTitle", "dashboardUnit",
          "tableHead", "tableBody"
        ].forEach((id) => { els[id] = byId(id); });
      }

      function shortYear(year) {
        return String(year).slice(2);
      }

      function formatNumber(value) {
        if (!Number.isFinite(value)) return "-";
        return new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 0 }).format(value);
      }

      function formatPercent(value) {
        if (!Number.isFinite(value)) return "-";
        return `${value >= 0 ? "" : "-"}${Math.abs(value * 100).toFixed(0)}%`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function optionHtml(value, label, selected) {
        return `<option value="${escapeHtml(value)}"${value === selected ? " selected" : ""}>${escapeHtml(label)}</option>`;
      }

      function uniqueSorted(values) {
        return Array.from(new Set(values.filter(Boolean))).sort((a, b) => a.localeCompare(b, "ko-KR"));
      }

      const currentYear = DATA.currentYear || Math.max(...DATA.periods.filter((p) => p.type === "month").map((p) => p.year));
      const currentThroughMonth = DATA.currentThroughMonth || Math.max(...DATA.periods.filter((p) => p.type === "month" && p.year === currentYear).map((p) => p.month));
      const previousYear = currentYear - 1;
      const twoYearsAgo = currentYear - 2;
      const periodById = new Map(DATA.periods.map((period) => [period.id, period]));
      const recordMaps = new Map();

      DATA.records.forEach((record) => {
        if (!recordMaps.has(record.periodId)) recordMaps.set(record.periodId, new Map());
        recordMaps.get(record.periodId).set(record.market, record);
      });

      function periodIdForMonth(year, month) {
        return `${year}-${String(month).padStart(2, "0")}`;
      }

      function recordFor(periodId, market) {
        return recordMaps.get(periodId)?.get(market) || null;
      }

      function monthRecord(year, month, market) {
        return recordFor(periodIdForMonth(year, month), market);
      }

      function closeRecord(year, market) {
        return recordFor(`${year}-close`, market);
      }

      function valueFor(record, brand) {
        if (!record) return 0;
        if (brand === "all") return Number(record.totalSales || 0);
        return Number(record.sales?.[brand] || 0);
      }

      function storeFor(record, brand) {
        if (!record || brand === "all") return "";
        return record.stores?.[brand] || "";
      }

      function ytdValue(year, throughMonth, market, brand) {
        let sum = 0;
        for (let month = 1; month <= throughMonth; month += 1) {
          sum += valueFor(monthRecord(year, month, market), brand);
        }
        return sum;
      }

      function growth(current, compare) {
        if (!Number.isFinite(current) || !Number.isFinite(compare) || compare === 0) return NaN;
        return (current - compare) / compare;
      }

      function growthClass(value) {
        if (!Number.isFinite(value)) return "";
        return value < 0 ? "down" : "up";
      }

      function allMarkets() {
        return uniqueSorted(DATA.records.map((record) => record.market));
      }

      function recordsForPeriod(periodId) {
        return DATA.records.filter((record) => record.periodId === periodId);
      }

      function selectedPeriodRecords() {
        return recordsForPeriod(periodIdForMonth(currentYear, state.month));
      }

      function marketsForFilters() {
        const records = selectedPeriodRecords().length ? selectedPeriodRecords() : DATA.records;
        return uniqueSorted(records
          .filter((record) => {
            if (state.region !== "all" && record.region !== state.region) return false;
            if (state.status !== "all" && record.status !== state.status) return false;
            return true;
          })
          .map((record) => record.market));
      }

      function exactOrFirstMarket(text) {
        const value = String(text || "").trim();
        const markets = marketsForFilters().length ? marketsForFilters() : allMarkets();
        if (!value) return state.market || markets[0] || "";

        const exact = markets.find((market) => market === value);
        if (exact) return exact;

        const lower = value.toLocaleLowerCase("ko-KR");
        return markets.find((market) => market.toLocaleLowerCase("ko-KR").includes(lower)) || state.market || markets[0] || "";
      }

      function monthlyPoint(year, month, market, brand) {
        const record = monthRecord(year, month, market);
        return {
          year,
          month,
          sales: valueFor(record, brand),
          store: storeFor(record, brand)
        };
      }

      function currentYearHistory(market, brand) {
        const history = [];
        for (let month = 1; month <= currentThroughMonth; month += 1) {
          history.push(monthlyPoint(currentYear, month, market, brand));
        }
        return history;
      }

      function lastPositiveBefore(history, month) {
        return history
          .filter((point) => point.month < month && point.sales > 0)
          .at(-1) || null;
      }

      function firstPositiveAtOrBefore(history, month) {
        return history.find((point) => point.month <= month && point.sales > 0) || null;
      }

      function lastStoreBefore(market, brand, month) {
        for (let cursor = month - 1; cursor >= 1; cursor -= 1) {
          const store = storeFor(monthRecord(currentYear, cursor, market), brand);
          if (store) return store;
        }

        const previousSameMonth = storeFor(monthRecord(previousYear, month, market), brand);
        if (previousSameMonth) return previousSameMonth;

        return storeFor(closeRecord(previousYear, market), brand);
      }

      function normalizeStoreName(name) {
        return String(name || "")
          .replace(/\s+/g, "")
          .replace(/[()_\-]/g, "")
          .replace(/\d+$/g, "");
      }

      function hasCodeSuffix(name) {
        return /(?:\s|_|-|\(|^)\d+\)?$/.test(String(name || "").trim()) || /\d+$/.test(String(name || "").trim());
      }

      function buildRemark(market, brand, fallbackStore) {
        const history = currentYearHistory(market, brand);
        const current = monthlyPoint(currentYear, state.month, market, brand);
        const firstPositive = firstPositiveAtOrBefore(history, state.month);
        const lastPositive = lastPositiveBefore(history, state.month);
        const previousYtd = ytdValue(previousYear, Math.min(state.month, currentThroughMonth), market, brand);
        const prevClose = valueFor(closeRecord(previousYear, market), brand);
        const displayStore = current.store || fallbackStore || "";
        const currentStore = current.store;
        const previousStore = lastStoreBefore(market, brand, state.month);
        const notes = [];

        if (displayStore) {
          notes.push(`매장: ${displayStore}`);
        }

        if (firstPositive && firstPositive.month === state.month) {
          if (previousYtd > 0 || prevClose > 0) {
            notes.push(`재오픈/운영변경 가능(${shortYear(currentYear)}년 ${firstPositive.month}월)`);
          } else {
            notes.push(`신규오픈(${shortYear(currentYear)}년 ${firstPositive.month}월)`);
          }
        }

        if (current.sales <= 0 && lastPositive) {
          notes.push(`폐점/미조회 가능(${shortYear(currentYear)}년 ${lastPositive.month + 1}월~)`);
        } else if (current.sales <= 0 && !firstPositive && (previousYtd > 0 || prevClose > 0)) {
          notes.push("전년 운영, 올해 매출 미조회");
        }

        if (currentStore && previousStore && currentStore !== previousStore) {
          const currentBase = normalizeStoreName(currentStore);
          const previousBase = normalizeStoreName(previousStore);
          if ((currentBase && previousBase && currentBase === previousBase) || hasCodeSuffix(currentStore)) {
            notes.push(`운영자/코드변경 의심(${previousStore} → ${currentStore})`);
          } else {
            notes.push(`매장명 변경(${previousStore} → ${currentStore})`);
          }
        }

        return notes.join(" · ");
      }

      function selectedMonthRecord(market) {
        return monthRecord(currentYear, state.month, market);
      }

      function marketStatusAndRegion(market) {
        const record = selectedMonthRecord(market) || recordFor(`${currentYear}-ytd`, market) || monthRecord(previousYear, state.month, market);
        return {
          status: record?.status || "",
          region: record?.region || ""
        };
      }

      function buildMarketRows(market) {
        const currentRecord = monthRecord(currentYear, state.month, market);
        const previousRecord = monthRecord(previousYear, state.month, market);
        const prevCloseRecord = closeRecord(previousYear, market);
        const oldCloseRecord = closeRecord(twoYearsAgo, market);

        return DATA.brands.map((brand) => {
          const currentMonth = valueFor(currentRecord, brand);
          const previousMonth = valueFor(previousRecord, brand);
          const currentYtd = ytdValue(currentYear, state.month, market, brand);
          const previousYtd = ytdValue(previousYear, state.month, market, brand);
          const prevClose = valueFor(prevCloseRecord, brand);
          const oldClose = valueFor(oldCloseRecord, brand);
          const store = storeFor(currentRecord, brand) || storeFor(prevCloseRecord, brand) || storeFor(previousRecord, brand);
          const remark = buildRemark(market, brand, store);

          return {
            name: brand,
            currentMonth,
            previousMonth,
            monthGrowth: growth(currentMonth, previousMonth),
            currentYtd,
            previousYtd,
            ytdGrowth: growth(currentYtd, previousYtd),
            prevClose,
            oldClose,
            closeGrowth: growth(prevClose, oldClose),
            note: remark
          };
        })
          .filter((row) => row.note || row.currentMonth || row.previousMonth || row.currentYtd || row.previousYtd || row.prevClose || row.oldClose)
          .sort((a, b) => b.currentYtd - a.currentYtd || b.currentMonth - a.currentMonth || a.name.localeCompare(b.name, "ko-KR"));
      }

      function buildBrandRows(brand) {
        const rows = allMarkets().map((market) => {
          const meta = marketStatusAndRegion(market);
          const currentRecord = monthRecord(currentYear, state.month, market);
          const previousRecord = monthRecord(previousYear, state.month, market);
          const prevCloseRecord = closeRecord(previousYear, market);
          const oldCloseRecord = closeRecord(twoYearsAgo, market);
          const currentMonth = valueFor(currentRecord, brand);
          const previousMonth = valueFor(previousRecord, brand);
          const currentYtd = ytdValue(currentYear, state.month, market, brand);
          const previousYtd = ytdValue(previousYear, state.month, market, brand);
          const prevClose = valueFor(prevCloseRecord, brand);
          const oldClose = valueFor(oldCloseRecord, brand);
          const note = storeFor(currentRecord, brand) || storeFor(prevCloseRecord, brand) || storeFor(previousRecord, brand);
          const remark = buildRemark(market, brand, note);

          return {
            name: market,
            region: meta.region,
            status: meta.status,
            currentMonth,
            previousMonth,
            monthGrowth: growth(currentMonth, previousMonth),
            currentYtd,
            previousYtd,
            ytdGrowth: growth(currentYtd, previousYtd),
            prevClose,
            oldClose,
            closeGrowth: growth(prevClose, oldClose),
            note: remark
          };
        })
          .filter((row) => {
            if (state.region !== "all" && row.region !== state.region) return false;
            if (state.status !== "all" && row.status !== state.status) return false;
            return row.note || row.currentMonth || row.previousMonth || row.currentYtd || row.previousYtd || row.prevClose || row.oldClose;
          });

        return rows.sort((a, b) => b.currentYtd - a.currentYtd || b.currentMonth - a.currentMonth || a.name.localeCompare(b.name, "ko-KR"));
      }

      function rowAverage(rows, key) {
        if (!rows.length) return 0;
        return rows.reduce((sum, row) => sum + (Number(row[key]) || 0), 0) / rows.length;
      }

      function rowTotal(rows, key) {
        return rows.reduce((sum, row) => sum + (Number(row[key]) || 0), 0);
      }

      function renderHead(leftLabel, mainTitle, noteLabel) {
        const yy = shortYear(currentYear);
        const py = shortYear(previousYear);
        const oy = shortYear(twoYearsAgo);
        const month = state.month;

        els.tableHead.innerHTML = `
          <tr>
            <th class="left-head" rowspan="2">${escapeHtml(leftLabel)}</th>
            <th class="head-main" colspan="10">${escapeHtml(mainTitle)}</th>
          </tr>
          <tr>
            <th class="head-month">${yy}년 ${month}월</th>
            <th class="head-month">${py}년 ${month}월</th>
            <th class="head-growth">신장율</th>
            <th class="head-ytd">${yy}년 누계</th>
            <th class="head-ytd">${py}년 동기간</th>
            <th class="head-growth">신장율</th>
            <th class="head-close">${py}년 마감</th>
            <th class="head-close2">${oy}년 마감</th>
            <th class="head-growth">신장율</th>
            <th class="left-head">${escapeHtml(noteLabel)}</th>
          </tr>
        `;
      }

      function renderRows(rows) {
        if (!rows.length) {
          els.tableBody.innerHTML = `<tr><td class="empty" colspan="11">조회 결과 없음</td></tr>`;
          return;
        }

        const body = rows.map((row) => `
          <tr>
            <td class="name">${escapeHtml(row.name)}</td>
            <td class="number">${formatNumber(row.currentMonth)}</td>
            <td class="number">${formatNumber(row.previousMonth)}</td>
            <td class="growth ${growthClass(row.monthGrowth)}">${formatPercent(row.monthGrowth)}</td>
            <td class="number">${formatNumber(row.currentYtd)}</td>
            <td class="number">${formatNumber(row.previousYtd)}</td>
            <td class="growth ${growthClass(row.ytdGrowth)}">${formatPercent(row.ytdGrowth)}</td>
            <td class="number close-cell">${formatNumber(row.prevClose)}</td>
            <td class="number close2-cell">${formatNumber(row.oldClose)}</td>
            <td class="growth ${growthClass(row.closeGrowth)}">${formatPercent(row.closeGrowth)}</td>
            <td class="remark">${escapeHtml(row.note || "")}</td>
          </tr>
        `).join("");

        const avgCurrentMonth = rowAverage(rows, "currentMonth");
        const avgPreviousMonth = rowAverage(rows, "previousMonth");
        const avgCurrentYtd = rowAverage(rows, "currentYtd");
        const avgPreviousYtd = rowAverage(rows, "previousYtd");
        const avgPrevClose = rowAverage(rows, "prevClose");
        const avgOldClose = rowAverage(rows, "oldClose");

        const avgRow = `
          <tr class="avg-row">
            <td>평균</td>
            <td class="number">${formatNumber(avgCurrentMonth)}</td>
            <td class="number">${formatNumber(avgPreviousMonth)}</td>
            <td class="growth ${growthClass(growth(avgCurrentMonth, avgPreviousMonth))}">${formatPercent(growth(avgCurrentMonth, avgPreviousMonth))}</td>
            <td class="number">${formatNumber(avgCurrentYtd)}</td>
            <td class="number">${formatNumber(avgPreviousYtd)}</td>
            <td class="growth ${growthClass(growth(avgCurrentYtd, avgPreviousYtd))}">${formatPercent(growth(avgCurrentYtd, avgPreviousYtd))}</td>
            <td class="number">${formatNumber(avgPrevClose)}</td>
            <td class="number">${formatNumber(avgOldClose)}</td>
            <td class="growth ${growthClass(growth(avgPrevClose, avgOldClose))}">${formatPercent(growth(avgPrevClose, avgOldClose))}</td>
            <td></td>
          </tr>
        `;

        els.tableBody.innerHTML = body + avgRow;
      }

      function renderSummary(rows, title, itemLabel) {
        const currentMonth = rowTotal(rows, "currentMonth");
        const previousMonth = rowTotal(rows, "previousMonth");
        const currentYtd = rowTotal(rows, "currentYtd");
        const previousYtd = rowTotal(rows, "previousYtd");
        const top = rows[0];

        els.metricOneLabel.textContent = `${shortYear(currentYear)}년 ${state.month}월 매출`;
        els.metricOne.textContent = formatNumber(currentMonth);
        els.metricOneNote.textContent = title;
        els.metricTwo.textContent = formatPercent(growth(currentMonth, previousMonth));
        els.metricTwo.className = `metric-value ${growthClass(growth(currentMonth, previousMonth))}`;
        els.metricTwoNote.textContent = `${shortYear(previousYear)}년 ${state.month}월 ${formatNumber(previousMonth)}`;
        els.metricThree.textContent = formatNumber(currentYtd);
        els.metricThreeNote.textContent = `${shortYear(previousYear)}년 동기간 ${formatNumber(previousYtd)} · ${formatPercent(growth(currentYtd, previousYtd))}`;
        els.metricFourLabel.textContent = itemLabel;
        els.metricFour.textContent = formatNumber(rows.length);
        els.metricFourNote.textContent = top ? `1위 ${top.name} ${formatNumber(top.currentYtd)}` : "-";
      }

      function renderMarketDashboard() {
        state.market = exactOrFirstMarket(state.market || els.marketInput.value);
        els.marketInput.value = state.market;

        const rows = buildMarketRows(state.market);
        const meta = marketStatusAndRegion(state.market);
        const title = `${state.market}${meta.region ? ` · ${meta.region}` : ""}${meta.status ? ` · ${meta.status}` : ""}`;

        els.dashboardTitle.textContent = `${state.market} 매출 현황`;
        els.dashboardUnit.textContent = `(단위 : 천원) · ${shortYear(currentYear)}년 ${state.month}월 기준`;
        renderHead("브랜드", state.market, "비고");
        renderRows(rows);
        renderSummary(rows, title, "브랜드 수");
      }

      function renderBrandDashboard() {
        const rows = buildBrandRows(state.brand);
        const title = `${state.brand} · ${shortYear(currentYear)}년 ${state.month}월 기준`;

        els.dashboardTitle.textContent = `${state.brand} 상권별 매출 현황`;
        els.dashboardUnit.textContent = `(단위 : 천원) · ${state.region === "all" ? "전체 지역" : state.region}`;
        renderHead("상권", state.brand, "비고");
        renderRows(rows);
        renderSummary(rows, title, "상권 수");
      }

      function renderControls() {
        const currentMonths = DATA.periods
          .filter((period) => period.type === "month" && period.year === currentYear)
          .sort((a, b) => a.month - b.month);
        els.monthSelect.innerHTML = currentMonths
          .map((period) => optionHtml(String(period.month), period.label, String(state.month)))
          .join("");

        const periodRecords = selectedPeriodRecords().length ? selectedPeriodRecords() : DATA.records;
        const regions = uniqueSorted(periodRecords.map((record) => record.region));
        if (state.region !== "all" && !regions.includes(state.region)) state.region = "all";
        els.regionSelect.innerHTML = [
          optionHtml("all", "전체 지역", state.region),
          ...regions.map((region) => optionHtml(region, region, state.region))
        ].join("");

        const statuses = uniqueSorted(periodRecords.map((record) => record.status));
        if (state.status !== "all" && !statuses.includes(state.status)) state.status = statuses.includes("입점") ? "입점" : "all";
        els.statusSelect.innerHTML = [
          optionHtml("all", "전체 구분", state.status),
          ...statuses.map((status) => optionHtml(status, status, state.status))
        ].join("");

        els.brandSelect.innerHTML = DATA.brands
          .map((brand) => optionHtml(brand, brand, state.brand))
          .join("");

        const filteredMarkets = marketsForFilters();
        if (state.mode === "market" && filteredMarkets.length && !filteredMarkets.includes(state.market)) {
          state.market = filteredMarkets[0];
        }

        els.marketSelect.innerHTML = filteredMarkets
          .map((market) => optionHtml(market, market, state.market))
          .join("");

        els.marketList.innerHTML = filteredMarkets
          .map((market) => `<option value="${escapeHtml(market)}"></option>`)
          .join("");
      }

      function renderModeState() {
        document.querySelectorAll(".mode-tabs button").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.mode === state.mode);
        });

        els.marketField.classList.toggle("hidden", state.mode !== "market");
        els.marketPickField.classList.toggle("hidden", state.mode !== "market");
        els.brandField.classList.toggle("hidden", state.mode !== "brand");
      }

      function render() {
        renderModeState();
        renderControls();

        if (state.mode === "market") renderMarketDashboard();
        else renderBrandDashboard();
      }

      function reset() {
        state.mode = "market";
        state.month = currentThroughMonth;
        state.region = "all";
        state.status = "입점";
        state.market = allMarkets().includes("김포장기") ? "김포장기" : allMarkets()[0] || "";
        state.brand = DATA.brands.includes("SHESMISS") ? "SHESMISS" : DATA.brands[0] || "";
        els.marketInput.value = state.market;
        render();
      }

      function bindEvents() {
        document.querySelectorAll(".mode-tabs button").forEach((button) => {
          button.addEventListener("click", () => {
            state.mode = button.dataset.mode;
            render();
          });
        });

        els.marketInput.addEventListener("change", () => {
          state.market = exactOrFirstMarket(els.marketInput.value);
          render();
        });

        els.marketSelect.addEventListener("change", (event) => {
          state.market = event.target.value;
          els.marketInput.value = state.market;
          render();
        });

        els.marketInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            state.market = exactOrFirstMarket(els.marketInput.value);
            render();
          }
        });

        els.brandSelect.addEventListener("change", (event) => {
          state.brand = event.target.value;
          render();
        });

        els.monthSelect.addEventListener("change", (event) => {
          state.month = Number(event.target.value);
          render();
        });

        els.regionSelect.addEventListener("change", (event) => {
          state.region = event.target.value;
          render();
        });

        els.statusSelect.addEventListener("change", (event) => {
          state.status = event.target.value;
          render();
        });

        els.resetButton.addEventListener("click", reset);
      }

      function boot() {
        initElements();

        if (!DATA || !Array.isArray(DATA.records)) {
          document.body.innerHTML = `<main class="app"><section class="panel"><div class="empty">data.js를 확인할 수 없습니다.</div></section></main>`;
          return;
        }

        els.sourceLabel.textContent = `원본 ${DATA.sourceFile || ""}`;
        els.asOfLabel.textContent = `${shortYear(currentYear)}년 ${currentThroughMonth}월까지`;

        bindEvents();
        reset();
      }

      boot();
    })();
  </script>
</body>
</html>
